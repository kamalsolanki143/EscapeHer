<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="EscapeHer mark">
  <defs>
    <linearGradient id="ehWingGrad" x1="100" y1="65" x2="100" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E5F58"/>
      <stop offset="1" stop-color="#2C6E8F"/>
    </linearGradient>
    <radialGradient id="ehSparkGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0" stop-color="#F5D9A8"/>
      <stop offset="1" stop-color="#E8A33D"/>
    </radialGradient>
    <filter id="ehGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
    </filter>
  </defs>

  <!-- warm glow held inside the cupped wings -->
  <circle cx="100" cy="122" r="22" fill="#E8A33D" opacity="0.35" filter="url(#ehGlow)"/>

  <!-- left wing, leaning outward -->
  <path d="M 0 0 A 45 45 0 0 0 0 -80 A 45 45 0 0 0 0 0 Z"
        fill="url(#ehWingGrad)" transform="translate(85,145) rotate(-30)"/>

  <!-- right wing, mirrored -->
  <path d="M 0 0 A 45 45 0 0 1 0 -80 A 45 45 0 0 1 0 0 Z"
        fill="url(#ehWingGrad)" transform="translate(115,145) rotate(30)"/>

  <!-- the spark, cradled between them -->
  <path d="M 100 109 L 103.4 118.6 L 113 122 L 103.4 125.4 L 100 135 L 96.6 125.4 L 87 122 L 96.6 118.6 Z"
        fill="url(#ehSparkGrad)"/>
</svg>
